        const PATHS = {

        };

        function icon(name, extra) {
            return `<svg class="ico${extra ? ' ' + extra : ''}" viewBox="0 0 24 24" aria-hidden="true"><path d="${PATHS[name]}"/></svg>`;
        }

        // ---------- Helpers ----------
        const SPOTIFY_RE = /https:\/\/(?:open\.spotify\.com\/track|spotify\.link)\/([a-zA-Z0-9]+)(\?[^ ]*)?/;
        const app = document.getElementById('app');

        function escapeHtml(str) {
            return (str || '').replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }

        function extractSpotifyId(text) {
            const match = text.match(SPOTIFY_RE);
            return match ? match[1] : null;
        }

        function spotifyEmbed(trackId) {
            // Försvar på djupet: gamla poster i databasen kan i teorin innehålla
            // ovaliderade trackId:n — släpp aldrig in annat än base62 i iframe-src.
            if (!/^[a-zA-Z0-9]+$/.test(trackId)) return '';
            return `<iframe src="https://open.spotify.com/embed/track/${trackId}?utm_source=enkram"
                width="100%" height="152" frameBorder="0" loading="lazy" allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
        }

        // Fetch track title + album art via Spotify's public oEmbed (CORS-enabled) for a nice preview card.
        async function fetchTrackMeta(id) {
            try {
                const res = await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/track/${id}`);
                if (!res.ok) return null;
                const data = await res.json();
                return { title: data.title || null, thumb: data.thumbnail_url || null };
            } catch (e) {
                return null;
            }
        }

        // ---------- API ----------
        async function sendKram(payload) {
            const res = await fetch('/api/sendKram', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: payload.message, trackId: payload.trackId })
            });
            if (!res.ok) return { error: true };
            return await res.json();
        }

        // Skiljer på "kramen finns inte" (404) och nätverks-/serverfel,
        // så att ett trasigt nät inte ser ut som en utgången kram.
        async function loadKram(id) {
            try {
                const res = await fetch(`/api/getKram/${encodeURIComponent(id)}`);
                if (res.status === 404) return { notFound: true };
                if (!res.ok) return { error: true };
                return { kram: await res.json() };
            } catch (e) {
                return { error: true };
            }
        }

        function getIdFromUrl() {
            return window.location.pathname.slice(1);
        }

        // ---------- Screen: write a kram ----------
        function renderForm() {
            document.title = 'Skicka en kram och sprid värme | enkram.se';
            app.innerHTML = `
                <header class="head reveal">
                    <p class="eyebrow">enkram.se</p>
                    <h1>Ge en <em>kram</em> <span class="heart-beat">${icon('heart')}</span></h1>
                    <p class="lede">Skriv några ord från hjärtat och skicka lite värme till någon du tycker om.</p>
                </header>
                <form id="kramForm" class="form" novalidate>
                    <label class="sr-only" for="message">Din hälsning</label>
                    <div class="field reveal" style="--d:1">
                        <textarea id="message" name="message" rows="5" maxlength="500"
                            autocomplete="off" aria-describedby="counter"
                            placeholder="Skriv något från hjärtat…"></textarea>
                        <span class="counter" id="counter" aria-live="off">0 / 500</span>
                    </div>
                    <div class="song reveal" id="song" style="--d:2"></div>
                    <button type="submit" class="btn btn-primary reveal" id="sendBtn" style="--d:3" disabled>
                        <span class="btn-label">${icon('plane')} Skicka kram</span>
                        <span class="btn-spinner"></span>
                    </button>
                    <p class="note reveal" style="--d:4">${icon('clock')} Kramen finns kvar i 24 timmar, sen försvinner den.</p>
                </form>
                <div class="result" id="result" aria-live="assertive"></div>
            `;

            const field = document.getElementById('message');
            const counter = document.getElementById('counter');
            const sendBtn = document.getElementById('sendBtn');
            const song = document.getElementById('song');
            let trackId = null;

            function refresh() {
                const len = field.value.length;
                counter.textContent = `${len} / 500`;
                counter.classList.toggle('warn', len > 450);
                sendBtn.disabled = field.value.trim().length === 0 && !trackId;
            }

            function renderSongEmpty() {
                song.innerHTML = `
                    <div class="song-add">
                        <a class="song-add-ico" href="https://open.spotify.com/search" target="_blank"
                            rel="noopener noreferrer" aria-label="Öppna Spotify" title="Öppna Spotify">${icon('spotify')}</a>
                        <input type="text" id="songInput" class="song-input" inputmode="url"
                            autocomplete="off" spellcheck="false"
                            placeholder="klistra in en låt från Spotify" aria-label="Spotify-länk">
                    </div>`;
                document.getElementById('songInput').addEventListener('input', (e) => {
                    const m = e.target.value.match(SPOTIFY_RE);
                    if (m) { e.target.value = ''; setTrack(m[1]); }
                });
            }

            function renderSongCard(state) {
                const artStyle = state.thumb ? ` style="background-image:url('${state.thumb}')"` : '';
                song.innerHTML = `
                    <div class="song-card">
                        <a class="song-card-main" href="https://open.spotify.com/track/${state.id}" target="_blank" rel="noopener noreferrer">
                            <span class="song-art${state.loading ? ' loading' : ''}"${artStyle}>${state.thumb ? '' : icon('music')}</span>
                            <span class="song-meta">
                                <span class="song-title">${state.loading ? 'Hämtar låt…' : (state.title || 'Spotify-låt')}</span>
                                <span class="song-sub">${icon('spotify')} Spotify</span>
                            </span>
                        </a>
                        <button type="button" class="song-remove" id="songRemove" aria-label="Ta bort låt">${icon('close')}</button>
                    </div>`;
                document.getElementById('songRemove').addEventListener('click', clearTrack);
            }

            async function setTrack(id) {
                trackId = id;
                renderSongCard({ id, loading: true });
                refresh();
                const meta = await fetchTrackMeta(id);
                if (trackId === id) renderSongCard({ id, title: meta && meta.title, thumb: meta && meta.thumb });
            }

            function clearTrack() {
                trackId = null;
                renderSongEmpty();
                refresh();
                const input = document.getElementById('songInput');
                if (input) input.focus();
            }

            field.addEventListener('input', () => {
                const match = field.value.match(SPOTIFY_RE);
                if (match) {
                    field.value = field.value.replace(SPOTIFY_RE, '').trim();
                    setTrack(match[1]);
                }
                refresh();
            });

            document.getElementById('kramForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = field.value.trim();
                if (!message && !trackId) return;

                sendBtn.disabled = true;
                sendBtn.classList.add('is-loading');
                document.getElementById('result').innerHTML = '';

                const result = await sendKram({ message, trackId });

                if (!result || result.error || !result.link) {
                    sendBtn.classList.remove('is-loading');
                    sendBtn.disabled = false;
                    document.getElementById('result').innerHTML =
                        `<div class="error-box">Något gick fel när kramen skulle skickas. Försök igen 💗</div>`;
                    return;
                }

                const id = result.link.split('/').pop();
                const url = `${window.location.origin}/${id}`;
                const r = sendBtn.getBoundingClientRect();
                burstHearts(r.left + r.width / 2, r.top + r.height / 2, 10);
                renderShare({ url, message, hasTrack: !!trackId });
            });

            renderSongEmpty();
        }

        // ---------- Screen: kram is ready to share ----------
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
            } catch (e) {
                const t = document.createElement('textarea');
                t.value = text; document.body.appendChild(t); t.select();
                document.execCommand('copy'); t.remove();
            }
        }

        function renderShare({ url, message, hasTrack }) {
            document.title = 'Din kram är redo 💌 | enkram.se';
            const encoded = encodeURIComponent(url);
            const waText = encodeURIComponent(`Jag skickar dig en kram 🤗\n${url}`);
            const tgText = encodeURIComponent('Jag skickar dig en kram 🤗');
            const shortUrl = url.replace(/^https?:\/\//, '');
            const canShare = !!navigator.share;

            const previewBody = message
                ? `<p class="preview-msg">${escapeHtml(message)}</p>`
                : `<p class="preview-msg muted">En kram utan ord</p>`;

            app.innerHTML = `
                <header class="head reveal">
                    <span class="badge">${icon('check')} Skickad</span>
                    <h1>Din kram är <em>redo</em></h1>
                    <p class="lede">Dela den med någon du tycker om.</p>
                </header>
                <div class="card-preview reveal" style="--d:1">
                    ${previewBody}
                    ${hasTrack ? `<span class="preview-track">${icon('music')} Låt bifogad</span>` : ''}
                </div>
                <button class="link-pill reveal" id="linkPill" style="--d:2" title="Kopiera länken">
                    <span class="link-pill-url">${escapeHtml(shortUrl)}</span>
                    <span class="link-pill-ico">${icon('link')}</span>
                    <span class="link-pill-copied" aria-live="polite"></span>
                </button>
                <div class="share reveal" style="--d:3">
                    ${canShare ? `
                    <button class="share-btn native" id="shareNative">
                        <span class="share-ico">${icon('share')}</span><span class="share-text">Dela…</span>
                    </button>` : ''}
                    <button class="share-btn wa" id="shareWa">
                        <span class="share-ico">${icon('whatsapp')}</span><span class="share-text">Dela på WhatsApp</span>
                    </button>
                    <button class="share-btn tg" id="shareTg">
                        <span class="share-ico">${icon('telegram')}</span><span class="share-text">Dela på Telegram</span>
                    </button>
                    <button class="share-btn open" id="shareOpen">
                        <span class="share-ico">${icon('heart')}</span><span class="share-text">Öppna kramen</span>
                    </button>
                </div>
                <p class="restart reveal" style="--d:4"><a href="/">${icon('plus')} Skicka en ny kram</a></p>
            `;

            document.getElementById('shareWa').addEventListener('click',
                () => window.open(`https://wa.me/?text=${waText}`, '_blank', 'noopener'));
            document.getElementById('shareTg').addEventListener('click',
                () => window.open(`https://t.me/share/url?url=${encoded}&text=${tgText}`, '_blank', 'noopener'));
            document.getElementById('shareOpen').addEventListener('click',
                () => { window.location.href = url; });

            if (canShare) {
                document.getElementById('shareNative').addEventListener('click', async () => {
                    try {
                        await navigator.share({ title: 'En kram till dig 🤗', text: 'Jag skickar dig en kram 🤗', url });
                    } catch (e) { /* användaren avbröt */ }
                });
            }

            const pill = document.getElementById('linkPill');
            let pillTimer = null;
            pill.addEventListener('click', async () => {
                await copyToClipboard(url);
                pill.classList.add('copied');
                pill.querySelector('.link-pill-copied').textContent = 'Kopierad!';
                pill.querySelector('.link-pill-ico').innerHTML = icon('check');
                clearTimeout(pillTimer);
                pillTimer = setTimeout(() => {
                    pill.classList.remove('copied');
                    pill.querySelector('.link-pill-copied').textContent = '';
                    pill.querySelector('.link-pill-ico').innerHTML = icon('link');
                }, 2200);
            });
        }

        // ---------- Screen: receive a kram ----------
        // Hjärtskur från en punkt på skärmen (i pixlar).
        function burstHearts(x, y, count) {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            const layer = document.createElement('div');
            layer.className = 'burst';
            layer.setAttribute('aria-hidden', 'true');
            for (let i = 0; i < count; i++) {
                const h = document.createElement('span');
                h.className = 'burst-heart';
                const angle = (i / count) * Math.PI * 2 + Math.random() * 0.6;
                const dist = 70 + Math.random() * 110;
                const size = 12 + Math.random() * 16;
                h.style.left = x + 'px';
                h.style.top = y + 'px';
                h.style.width = size + 'px';
                h.style.height = size + 'px';
                h.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                h.style.setProperty('--dy', Math.sin(angle) * dist - 40 + 'px');
                h.style.setProperty('--rot', (Math.random() * 60 - 30) + 'deg');
                h.style.animationDelay = (Math.random() * 0.12) + 's';
                h.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%" fill="currentColor" aria-hidden="true"><path d="${PATHS.heart}"/></svg>`;
                layer.appendChild(h);
            }
            document.body.appendChild(layer);
            setTimeout(() => layer.remove(), 1600);
        }

        // Grov, vänlig tid kvar: "18 timmar" / "35 minuter".
        function timeLeftText(expiresAt) {
            const ms = expiresAt - Date.now();
            if (ms <= 0) return null;
            const hours = Math.round(ms / 3600000);
            if (hours >= 2) return `${hours} timmar`;
            const mins = Math.max(1, Math.round(ms / 60000));
            if (mins >= 60) return '1 timme';
            return mins === 1 ? '1 minut' : `${mins} minuter`;
        }

        function renderKram(kram) {
            document.title = 'Du har fått en kram 🤗 | enkram.se';
            document.body.classList.add('kram-page');
            app.innerHTML = `
                <div class="kram-view env-stage">
                    <p class="kram-eyebrow reveal">${icon('heart')} Du har fått en kram</p>
                    <button class="envelope reveal" id="envelope" style="--d:1" aria-label="Öppna kramen">
                        <span class="env-body"></span>
                        <span class="env-letter"></span>
                        <span class="env-flap"></span>
                        <span class="env-seal">${icon('heart')}</span>
                    </button>
                    <p class="env-hint reveal" style="--d:2">Tryck för att öppna</p>
                </div>
            `;

            const env = document.getElementById('envelope');
            let opened = false;
            env.addEventListener('click', () => {
                if (opened) return;
                opened = true;
                env.classList.add('opening');
                const r = env.getBoundingClientRect();
                burstHearts(r.left + r.width / 2, r.top + r.height / 2, 14);
                setTimeout(() => renderKramContent(kram), 620);
            });
        }

        function renderKramContent(kram) {
            // Samma base62-krav som i spotifyEmbed — inga ovaliderade id:n in i href.
            const trackId = (kram.trackId && /^[a-zA-Z0-9]+$/.test(kram.trackId)) ? kram.trackId : null;
            const track = trackId ? `
                <div class="kram-track reveal" style="--d:2">
                    ${spotifyEmbed(trackId)}
                    <a class="spotify-open" href="https://open.spotify.com/track/${trackId}" target="_blank" rel="noopener noreferrer">
                        ${icon('spotify')} Öppna i Spotify
                    </a>
                </div>` : '';

            const plain = (kram.message || '').replace(/<[^>]+>/g, '');
            const size = plain.length <= 40 ? 'xl' : plain.length <= 120 ? 'lg' : 'md';
            const body = kram.message || '🤗';

            const left = kram.expiresAt ? timeLeftText(kram.expiresAt) : null;
            const fade = left
                ? `<p class="kram-fade reveal" style="--d:4">${icon('clock')} Kramen bleknar bort om ${left}</p>`
                : '';

            app.innerHTML = `
                <div class="kram-view">
                    <p class="kram-eyebrow reveal">${icon('heart')} En kram till dig</p>
                    <p class="kram-msg ${size} reveal" style="--d:1" tabindex="-1">${body}</p>
                    ${track}
                    <a class="kram-restart reveal" style="--d:3" href="/">${icon('heart')} Skicka en egen kram</a>
                    ${fade}
                </div>
            `;
            const msg = app.querySelector('.kram-msg');
            if (msg) msg.focus({ preventScroll: true });
        }

        function renderNotFound() {
            document.title = 'Kramen finns inte längre | enkram.se';
            app.innerHTML = `
                <header class="head reveal">
                    <div class="emoji-badge">🌸</div>
                    <h1>Kramen har <em>flugit vidare</em></h1>
                    <p class="lede">Kramen du letar efter finns inte längre. Kramar lever bara i 24 timmar.</p>
                </header>
                <p class="restart reveal" style="--d:1"><a href="/">${icon('heart')} Skicka en egen kram</a></p>
            `;
        }

        function renderError(id) {
            document.title = 'Något gick fel | enkram.se';
            app.innerHTML = `
                <header class="head reveal">
                    <div class="emoji-badge">💔</div>
                    <h1>Något gick <em>fel</em></h1>
                    <p class="lede">Kramen gick inte att hämta just nu. Kolla din uppkoppling och försök igen.</p>
                </header>
                <p class="restart reveal" style="--d:1"><button class="link-btn" id="retryBtn">${icon('heart')} Försök igen</button></p>
            `;
            document.getElementById('retryBtn').addEventListener('click', async () => {
                renderLoading();
                const result = await loadKram(id);
                if (result.kram) renderKram(result.kram);
                else if (result.notFound) renderNotFound();
                else renderError(id);
            });
        }

        function renderLoading() {
            app.innerHTML = `
                <div class="loader">
                    <span class="loader-heart">${icon('heart')}</span>
                    <p>Hämtar din kram…</p>
                </div>`;
        }

        // ---------- Ambient floating hearts ----------
        function spawnHearts(n) {
            const layer = document.createElement('div');
            layer.className = 'hearts';
            layer.setAttribute('aria-hidden', 'true');
            for (let i = 0; i < n; i++) {
                const h = document.createElement('span');
                h.className = 'float-heart';
                const size = 10 + Math.random() * 20;
                h.style.left = Math.random() * 100 + 'vw';
                h.style.width = size + 'px';
                h.style.height = size + 'px';
                h.style.animationDuration = (11 + Math.random() * 9) + 's';
                h.style.animationDelay = (Math.random() * 10) + 's';
                h.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%" fill="currentColor" aria-hidden="true"><path d="${PATHS.heart}"/></svg>`;
                layer.appendChild(h);
            }
            document.body.appendChild(layer);
        }

        // ---------- Boot ----------
        (async function () {
            spawnHearts(7);
            const id = getIdFromUrl();
            if (id) {
                // Ephemeral hug pages (24h) shouldn't be indexed.
                const robots = document.querySelector('meta[name="robots"]');
                if (robots) robots.setAttribute('content', 'noindex, follow');
                renderLoading();
                const result = await loadKram(id);
                if (result.kram) renderKram(result.kram);
                else if (result.notFound) renderNotFound();
                else renderError(id);
            } else {
                renderForm();
            }
        })();
    </script>
</body>

</html>
