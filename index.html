<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>En kram är på väg till dig!</title>
    <meta name="description" content="För att sprida värme och omtanke, skicka en kram till någon du bryr dig om">
    <meta name="keywords"
        content="enkram, kram, värme, omtanke, kärlek, kramar, skicka kram, sprid glädje, omtänksamhet, vänskap, gemenskap">
    <meta name="author" content="Enkram.se">
    <meta name="theme-color" content="#fdf5ee">
    <meta name="color-scheme" content="light">

    <meta property="og:title" content="En kram är på väg till dig!">
    <meta property="og:description"
        content="För att sprida värme och omtanke, skicka en kram till någon du bryr dig om.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://enkram.se">

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container" id="app">
        <!-- Innehållet styrs av JavaScript -->
    </main>

    <script>
        // ---------- Inline SVG icons (no icon-font dependency) ----------
        const PATHS = {
            heart: "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z",
            plane: "M2.01 21L23 12 2.01 3 2 10l15 2-15 2z",
            link: "M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z",
            check: "M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z",
            clock: "M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16zm.5-13H11v6l5.2 3.1.8-1.3-4.5-2.7V7z",
            plus: "M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z",
            close: "M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z",
            music: "M12 3v10.55A4 4 0 1014 17V7h4V3h-6z",
            spotify: "M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.59 14.43c-.18.3-.57.39-.87.21-2.39-1.46-5.4-1.79-8.95-.98-.34.08-.68-.14-.76-.48-.08-.34.14-.68.48-.76 3.88-.89 7.21-.5 9.89 1.14.3.18.39.57.21.87zm1.23-2.73c-.23.37-.71.48-1.08.26-2.73-1.68-6.9-2.17-10.13-1.19-.42.13-.86-.11-.99-.53-.13-.42.11-.86.53-.98 3.69-1.12 8.28-.57 11.42 1.36.36.22.48.71.25 1.08zm.11-2.85C14.7 8.95 9.4 8.77 6.34 9.7c-.5.15-1.03-.13-1.18-.63-.15-.5.13-1.03.63-1.18 3.51-1.07 9.36-.86 13.05 1.33.45.27.6.85.33 1.3-.27.45-.85.6-1.3.33z",
            whatsapp: "M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z",
            telegram: "M11.944 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0a12 12 0 00-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 01.171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.061 3.345-.479.329-.913.489-1.302.481-.428-.009-1.252-.242-1.865-.44-.752-.244-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"
        };

        function icon(name, extra) {
            return `<svg class="ico${extra ? ' ' + extra : ''}" viewBox="0 0 24 24" aria-hidden="true"><path d="${PATHS[name]}"/></svg>`;
        }

        // ---------- Helpers ----------
        const SPOTIFY_RE = /https:\/\/(?:open\.spotify\.com\/track|spotify\.link)\/([a-zA-Z0-9]+)(\?[^ ]*)?/;
        const app = document.getElementById('app');

        function escapeHtml(str) {
            return (str || '').replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }

        function extractSpotifyId(text) {
            const match = text.match(SPOTIFY_RE);
            return match ? match[1] : null;
        }

        function spotifyEmbed(trackId) {
            return `<iframe src="https://open.spotify.com/embed/track/${trackId}?utm_source=enkram"
                width="100%" height="152" frameBorder="0" loading="lazy" allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
        }

        // Fetch track title + album art via Spotify's public oEmbed (CORS-enabled) for a nice preview card.
        async function fetchTrackMeta(id) {
            try {
                const res = await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/track/${id}`);
                if (!res.ok) return null;
                const data = await res.json();
                return { title: data.title || null, thumb: data.thumbnail_url || null };
            } catch (e) {
                return null;
            }
        }

        // ---------- API ----------
        async function sendKram(payload) {
            const res = await fetch('/api/sendKram', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: payload.message, trackId: payload.trackId })
            });
            if (!res.ok) return { error: true };
            return await res.json();
        }

        async function loadKram(id) {
            const res = await fetch(`/api/getKram/${id}`);
            if (!res.ok) return null;
            return await res.json();
        }

        function getIdFromUrl() {
            return window.location.pathname.slice(1);
        }

        // ---------- Screen: write a kram ----------
        function renderForm() {
            app.innerHTML = `
                <header class="head reveal">
                    <p class="eyebrow">enkram.se</p>
                    <h1>Ge en <em>kram</em> <span class="heart-beat">${icon('heart')}</span></h1>
                    <p class="lede">Skriv några ord från hjärtat och skicka lite värme till någon du tycker om.</p>
                </header>
                <form id="kramForm" class="form" novalidate>
                    <label class="sr-only" for="message">Din hälsning</label>
                    <div class="field reveal" style="--d:1">
                        <textarea id="message" name="message" rows="5" maxlength="500"
                            autocomplete="off" aria-describedby="counter"
                            placeholder="Skriv något från hjärtat…"></textarea>
                        <span class="counter" id="counter" aria-live="off">0 / 500</span>
                    </div>
                    <div class="song reveal" id="song" style="--d:2"></div>
                    <button type="submit" class="btn btn-primary reveal" id="sendBtn" style="--d:3" disabled>
                        <span class="btn-label">${icon('plane')} Skicka kram</span>
                        <span class="btn-spinner"></span>
                    </button>
                    <p class="note reveal" style="--d:4">${icon('clock')} Kramen finns kvar i 24 timmar, sen försvinner den.</p>
                </form>
                <div class="result" id="result" aria-live="assertive"></div>
            `;

            const field = document.getElementById('message');
            const counter = document.getElementById('counter');
            const sendBtn = document.getElementById('sendBtn');
            const song = document.getElementById('song');
            let trackId = null;

            function refresh() {
                const len = field.value.length;
                counter.textContent = `${len} / 500`;
                counter.classList.toggle('warn', len > 450);
                sendBtn.disabled = field.value.trim().length === 0 && !trackId;
            }

            function renderSongEmpty() {
                song.innerHTML = `
                    <div class="song-add">
                        <a class="song-add-ico" href="https://open.spotify.com/search" target="_blank"
                            rel="noopener noreferrer" aria-label="Öppna Spotify" title="Öppna Spotify">${icon('spotify')}</a>
                        <input type="text" id="songInput" class="song-input" inputmode="url"
                            autocomplete="off" spellcheck="false"
                            placeholder="klistra in en låt från Spotify" aria-label="Spotify-länk">
                    </div>`;
                document.getElementById('songInput').addEventListener('input', (e) => {
                    const m = e.target.value.match(SPOTIFY_RE);
                    if (m) { e.target.value = ''; setTrack(m[1]); }
                });
            }

            function renderSongCard(state) {
                const artStyle = state.thumb ? ` style="background-image:url('${state.thumb}')"` : '';
                song.innerHTML = `
                    <div class="song-card">
                        <a class="song-card-main" href="https://open.spotify.com/track/${state.id}" target="_blank" rel="noopener noreferrer">
                            <span class="song-art${state.loading ? ' loading' : ''}"${artStyle}>${state.thumb ? '' : icon('music')}</span>
                            <span class="song-meta">
                                <span class="song-title">${state.loading ? 'Hämtar låt…' : (state.title || 'Spotify-låt')}</span>
                                <span class="song-sub">${icon('spotify')} Spotify</span>
                            </span>
                        </a>
                        <button type="button" class="song-remove" id="songRemove" aria-label="Ta bort låt">${icon('close')}</button>
                    </div>`;
                document.getElementById('songRemove').addEventListener('click', clearTrack);
            }

            async function setTrack(id) {
                trackId = id;
                renderSongCard({ id, loading: true });
                refresh();
                const meta = await fetchTrackMeta(id);
                if (trackId === id) renderSongCard({ id, title: meta && meta.title, thumb: meta && meta.thumb });
            }

            function clearTrack() {
                trackId = null;
                renderSongEmpty();
                refresh();
                const input = document.getElementById('songInput');
                if (input) input.focus();
            }

            field.addEventListener('input', () => {
                const match = field.value.match(SPOTIFY_RE);
                if (match) {
                    field.value = field.value.replace(SPOTIFY_RE, '').trim();
                    setTrack(match[1]);
                }
                refresh();
            });

            document.getElementById('kramForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = field.value.trim();
                if (!message && !trackId) return;

                sendBtn.disabled = true;
                sendBtn.classList.add('is-loading');
                document.getElementById('result').innerHTML = '';

                const result = await sendKram({ message, trackId });

                if (!result || result.error || !result.link) {
                    sendBtn.classList.remove('is-loading');
                    sendBtn.disabled = false;
                    document.getElementById('result').innerHTML =
                        `<div class="error-box">Något gick fel när kramen skulle skickas. Försök igen 💗</div>`;
                    return;
                }

                const id = result.link.split('/').pop();
                const url = `${window.location.origin}/${id}`;
                renderShare({ url, message, hasTrack: !!trackId });
            });

            renderSongEmpty();
        }

        // ---------- Screen: kram is ready to share ----------
        function renderShare({ url, message, hasTrack }) {
            const encoded = encodeURIComponent(url);
            const waText = encodeURIComponent(`Jag skickar dig en kram 🤗\n${url}`);
            const tgText = encodeURIComponent('Jag skickar dig en kram 🤗');

            const previewBody = message
                ? `<p class="preview-msg">${escapeHtml(message)}</p>`
                : `<p class="preview-msg muted">En kram utan ord</p>`;

            app.innerHTML = `
                <header class="head reveal">
                    <span class="badge">${icon('check')} Skickad</span>
                    <h1>Din kram är <em>redo</em></h1>
                    <p class="lede">Dela den med någon du tycker om.</p>
                </header>
                <div class="card-preview reveal" style="--d:1">
                    ${previewBody}
                    ${hasTrack ? `<span class="preview-track">${icon('music')} Låt bifogad</span>` : ''}
                </div>
                <div class="share reveal" style="--d:2">
                    <button class="share-btn wa" id="shareWa">
                        <span class="share-ico">${icon('whatsapp')}</span><span class="share-text">Dela på WhatsApp</span>
                    </button>
                    <button class="share-btn tg" id="shareTg">
                        <span class="share-ico">${icon('telegram')}</span><span class="share-text">Dela på Telegram</span>
                    </button>
                    <button class="share-btn copy" id="shareCopy">
                        <span class="share-ico">${icon('link')}</span><span class="share-text">Kopiera länk</span>
                    </button>
                    <button class="share-btn open" id="shareOpen">
                        <span class="share-ico">${icon('heart')}</span><span class="share-text">Öppna kramen</span>
                    </button>
                </div>
                <p class="restart reveal" style="--d:3"><a href="/">${icon('plus')} Skicka en ny kram</a></p>
            `;

            document.getElementById('shareWa').addEventListener('click',
                () => window.open(`https://wa.me/?text=${waText}`, '_blank', 'noopener'));
            document.getElementById('shareTg').addEventListener('click',
                () => window.open(`https://t.me/share/url?url=${encoded}&text=${tgText}`, '_blank', 'noopener'));
            document.getElementById('shareOpen').addEventListener('click',
                () => { window.location.href = url; });

            const copyBtn = document.getElementById('shareCopy');
            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(url);
                } catch (e) {
                    const t = document.createElement('textarea');
                    t.value = url; document.body.appendChild(t); t.select();
                    document.execCommand('copy'); t.remove();
                }
                copyBtn.classList.add('copied');
                copyBtn.querySelector('.share-ico').innerHTML = icon('check');
                copyBtn.querySelector('.share-text').textContent = 'Kopierad!';
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.querySelector('.share-ico').innerHTML = icon('link');
                    copyBtn.querySelector('.share-text').textContent = 'Kopiera länk';
                }, 2200);
            });
        }

        // ---------- Screen: receive a kram ----------
        function renderKram(kram) {
            const track = kram.trackId ? `
                <div class="kram-track">
                    ${spotifyEmbed(kram.trackId)}
                    <a class="spotify-open" href="https://open.spotify.com/track/${kram.trackId}" target="_blank" rel="noopener noreferrer">
                        ${icon('spotify')} Öppna i Spotify
                    </a>
                </div>` : '';

            app.innerHTML = `
                <header class="head reveal">
                    <span class="badge">${icon('heart')} En kram till dig</span>
                    <h1>Du har fått en <em>kram</em></h1>
                </header>
                <article class="kram reveal" style="--d:1">
                    <div class="kram-glow"></div>
                    <div class="kram-mark">${icon('heart')}</div>
                    <p class="kram-msg">${kram.message || ''}</p>
                    ${track}
                </article>
                <p class="note reveal" style="--d:2">${icon('clock')} Kramar lever i 24 timmar.</p>
                <p class="restart reveal" style="--d:3"><a href="/">${icon('heart')} Skicka en egen kram</a></p>
            `;
        }

        function renderNotFound() {
            app.innerHTML = `
                <header class="head reveal">
                    <div class="emoji-badge">🌸</div>
                    <h1>Kramen har <em>flugit vidare</em></h1>
                    <p class="lede">Kramen du letar efter finns inte längre. Kramar lever bara i 24 timmar.</p>
                </header>
                <p class="restart reveal" style="--d:1"><a href="/">${icon('heart')} Skicka en egen kram</a></p>
            `;
        }

        function renderLoading() {
            app.innerHTML = `
                <div class="loader">
                    <span class="loader-heart">${icon('heart')}</span>
                    <p>Hämtar din kram…</p>
                </div>`;
        }

        // ---------- Boot ----------
        (async function () {
            const id = getIdFromUrl();
            if (id) {
                renderLoading();
                const kram = await loadKram(id);
                if (kram) renderKram(kram);
                else renderNotFound();
            } else {
                renderForm();
            }
        })();
    </script>
</body>

</html>
